<!DOCTYPE html>
<html lang="ja" data-theme="marine-light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>アカウント登録 — bookmarkly</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
  <style>
    :root {
      --ab-semantic-color-brand-default: #0c6993;
      --ab-semantic-color-brand-dark: #003f65;
      --ab-semantic-color-background-base: #f6f7f8;
      --ab-semantic-color-background-rest-primary: #ffffff;
      --ab-semantic-color-background-rest-secondary: #eaeef0;
      --ab-semantic-color-text-default: #4e5b61;
      --ab-semantic-color-text-secondary: #899295;
      --ab-semantic-color-text-brand: #0c6993;
      --ab-semantic-color-text-contrast: #ffffff;
      --ab-semantic-color-text-negative: #b21b00;
      --ab-semantic-color-border-brand: #0c6993;
      --ab-semantic-color-border-bold: #899295;
      --ab-semantic-color-border-light: #e1e7ea;
      --ab-semantic-color-border-negative: #b21b00;
      --ab-semantic-color-border-positive: #32cd32;
      --ab-semantic-spacing-1: 4px;
      --ab-semantic-spacing-2: 8px;
      --ab-semantic-spacing-4: 16px;
      --ab-semantic-spacing-6: 24px;
      --ab-semantic-spacing-8: 32px;
      --ab-semantic-border-radius-xs: 4px;
      --ab-semantic-border-radius-sm: 8px;
      --ab-semantic-border-radius-md: 16px;
      --ab-semantic-border-radius-full: 9999px;
      --ab-semantic-border-width-1: 1px;
      --ab-semantic-border-width-2: 2px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Avenir', 'Noto Sans JP', sans-serif;
      background: var(--ab-semantic-color-background-base);
      color: var(--ab-semantic-color-text-default);
      font-size: 14px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--ab-semantic-spacing-4);
    }

    /* ===== LOGIN CARD ===== */
    .login-card {
      background: var(--ab-semantic-color-background-rest-primary);
      border: var(--ab-semantic-border-width-1) solid var(--ab-semantic-color-border-light);
      border-radius: var(--ab-semantic-border-radius-md);
      padding: var(--ab-semantic-spacing-8);
      width: 100%;
      max-width: 440px;
    }

    /* ===== LOGO ===== */
    .login-logo {
      display: flex;
      align-items: center;
      gap: var(--ab-semantic-spacing-2);
      justify-content: center;
      margin-bottom: var(--ab-semantic-spacing-8);
    }

    .login-logo-icon {
      width: 36px;
      height: 36px;
      background: var(--ab-semantic-color-brand-default);
      border-radius: var(--ab-semantic-border-radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--ab-semantic-color-text-contrast);
    }

    .login-logo-text {
      font-size: 20px;
      font-weight: 700;
      color: var(--ab-semantic-color-text-brand);
      letter-spacing: 0.02em;
    }

    /* ===== TITLE ===== */
    .login-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--ab-semantic-color-text-default);
      text-align: center;
      margin-bottom: var(--ab-semantic-spacing-8);
    }

    /* ===== FORM ===== */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: var(--ab-semantic-spacing-1);
      margin-bottom: var(--ab-semantic-spacing-4);
    }

    .form-label {
      font-size: 14px;
      font-weight: 700;
      color: var(--ab-semantic-color-text-default);
    }

    .form-input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .form-input-icon {
      position: absolute;
      left: 12px;
      color: var(--ab-semantic-color-text-secondary);
      font-size: 20px;
      pointer-events: none;
      user-select: none;
    }

    .form-input {
      width: 100%;
      height: 48px;
      padding: 0 12px 0 40px;
      border: var(--ab-semantic-border-width-1) solid var(--ab-semantic-color-border-light);
      border-radius: var(--ab-semantic-border-radius-sm);
      font-family: inherit;
      font-size: 14px;
      color: var(--ab-semantic-color-text-default);
      background: var(--ab-semantic-color-background-rest-primary);
      outline: none;
      transition: border-color 0.15s;
    }

    .form-input::placeholder {
      color: var(--ab-semantic-color-text-secondary);
    }

    .form-input:hover {
      border-color: var(--ab-semantic-color-border-bold);
    }

    .form-input:focus {
      border-color: var(--ab-semantic-color-border-brand);
      border-width: var(--ab-semantic-border-width-2);
    }

    .form-input.is-error {
      border-color: var(--ab-semantic-color-border-negative);
      border-width: var(--ab-semantic-border-width-2);
    }

    .form-input.is-valid {
      border-color: var(--ab-semantic-color-border-positive);
      border-width: var(--ab-semantic-border-width-2);
    }

    /* ===== PASSWORD TOGGLE ===== */
    .password-toggle {
      position: absolute;
      right: 12px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--ab-semantic-color-text-secondary);
      display: flex;
      align-items: center;
      padding: 0;
    }

    .password-toggle:hover {
      color: var(--ab-semantic-color-text-default);
    }

    /* ===== HELPER TEXT ===== */
    .form-helper {
      font-size: 12px;
      color: var(--ab-semantic-color-text-secondary);
      margin-top: var(--ab-semantic-spacing-1);
    }

    .form-helper.is-error {
      color: var(--ab-semantic-color-text-negative);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* ===== PASSWORD STRENGTH ===== */
    .password-strength {
      margin-top: var(--ab-semantic-spacing-2);
    }

    .strength-bar {
      display: flex;
      gap: 4px;
      margin-bottom: 4px;
    }

    .strength-segment {
      flex: 1;
      height: 4px;
      border-radius: 2px;
      background: var(--ab-semantic-color-background-rest-secondary);
      transition: background 0.2s;
    }

    .strength-segment.weak   { background: #b21b00; }
    .strength-segment.medium { background: #ff6347; }
    .strength-segment.strong { background: #32cd32; }

    .strength-label {
      font-size: 12px;
      color: var(--ab-semantic-color-text-secondary);
    }

    /* ===== BUTTON ===== */
    .btn-primary {
      width: 100%;
      height: 48px;
      background: var(--ab-semantic-color-brand-default);
      color: var(--ab-semantic-color-text-contrast);
      border: var(--ab-semantic-border-width-2) solid var(--ab-semantic-color-brand-default);
      border-radius: var(--ab-semantic-border-radius-full);
      font-family: inherit;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      margin-top: var(--ab-semantic-spacing-6);
    }

    .btn-primary:hover {
      background: var(--ab-semantic-color-brand-dark);
      border-color: var(--ab-semantic-color-brand-dark);
    }

    .btn-primary:active {
      opacity: 0.9;
    }

    /* ===== DIVIDER ===== */
    .divider {
      display: flex;
      align-items: center;
      gap: var(--ab-semantic-spacing-2);
      margin: var(--ab-semantic-spacing-6) 0;
      color: var(--ab-semantic-color-text-secondary);
      font-size: 12px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--ab-semantic-color-border-light);
    }

    /* ===== LOGIN LINK ===== */
    .login-prompt {
      text-align: center;
      font-size: 14px;
      color: var(--ab-semantic-color-text-secondary);
    }

    .login-prompt a {
      color: var(--ab-semantic-color-text-brand);
      font-weight: 700;
      text-decoration: none;
    }

    .login-prompt a:hover {
      text-decoration: underline;
    }

    /* ===== FOOTER ===== */
    .login-footer {
      margin-top: var(--ab-semantic-spacing-6);
      text-align: center;
      font-size: 12px;
      color: var(--ab-semantic-color-text-secondary);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 480px) {
      .login-card {
        padding: var(--ab-semantic-spacing-6);
        border: none;
        background: transparent;
      }
    }
  </style>
</head>
<body>

  <div class="login-card">

    <!-- Logo -->
    <div class="login-logo">
      <div class="login-logo-icon">
        <span class="material-symbols-outlined" style="font-size:20px;">bookmark</span>
      </div>
      <span class="login-logo-text">bookmarkly</span>
    </div>

    <!-- Title -->
    <h1 class="login-title">アカウント登録</h1>

    <!-- Form -->
    <form onsubmit="return false;">

      <!-- Email -->
      <div class="form-group">
        <label class="form-label" for="email">メールアドレス</label>
        <div class="form-input-wrapper">
          <span class="form-input-icon material-symbols-outlined">mail</span>
          <input
            class="form-input"
            type="email"
            id="email"
            placeholder="example@email.com"
            autocomplete="email"
          >
        </div>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label class="form-label" for="password">パスワード</label>
        <div class="form-input-wrapper">
          <span class="form-input-icon material-symbols-outlined">lock</span>
          <input
            class="form-input"
            type="password"
            id="password"
            placeholder="8文字以上で入力"
            autocomplete="new-password"
            oninput="checkStrength(this.value)"
          >
          <button
            type="button"
            class="password-toggle"
            onclick="togglePassword('password', 'pw-toggle-icon')"
            aria-label="パスワードを表示"
          >
            <span class="material-symbols-outlined" id="pw-toggle-icon" style="font-size:20px;">visibility</span>
          </button>
        </div>
        <!-- Password strength -->
        <div class="password-strength" id="strength-area" style="display:none;">
          <div class="strength-bar">
            <div class="strength-segment" id="seg1"></div>
            <div class="strength-segment" id="seg2"></div>
            <div class="strength-segment" id="seg3"></div>
          </div>
          <span class="strength-label" id="strength-label"></span>
        </div>
      </div>

      <!-- Password Confirm -->
      <div class="form-group">
        <label class="form-label" for="password-confirm">パスワード（確認）</label>
        <div class="form-input-wrapper">
          <span class="form-input-icon material-symbols-outlined">lock_reset</span>
          <input
            class="form-input"
            type="password"
            id="password-confirm"
            placeholder="パスワードを再入力"
            autocomplete="new-password"
            oninput="checkConfirm()"
          >
          <button
            type="button"
            class="password-toggle"
            onclick="togglePassword('password-confirm', 'pw-confirm-toggle-icon')"
            aria-label="パスワードを表示"
          >
            <span class="material-symbols-outlined" id="pw-confirm-toggle-icon" style="font-size:20px;">visibility</span>
          </button>
        </div>
        <p class="form-helper is-error" id="confirm-error" style="display:none;">
          <span class="material-symbols-outlined" style="font-size:14px;">error</span>
          パスワードが一致しません
        </p>
      </div>

      <!-- Submit -->
      <button type="submit" class="btn-primary">アカウントを作成</button>

    </form>

    <!-- Divider -->
    <div class="divider">すでにアカウントをお持ちの方</div>

    <!-- Login link -->
    <p class="login-prompt">
      <a href="bookmarkly-login.html">ログインはこちら</a>
    </p>

  </div>

  <p class="login-footer">© 2026 bookmarkly</p>

  <script>
    function togglePassword(inputId, iconId) {
      const input = document.getElementById(inputId);
      const icon = document.getElementById(iconId);
      if (input.type === 'password') {
        input.type = 'text';
        icon.textContent = 'visibility_off';
      } else {
        input.type = 'password';
        icon.textContent = 'visibility';
      }
    }

    function checkStrength(value) {
      const area = document.getElementById('strength-area');
      const label = document.getElementById('strength-label');
      const segs = [
        document.getElementById('seg1'),
        document.getElementById('seg2'),
        document.getElementById('seg3'),
      ];

      if (!value) {
        area.style.display = 'none';
        return;
      }
      area.style.display = 'block';

      let score = 0;
      if (value.length >= 8) score++;
      if (/[A-Z]/.test(value) || /[0-9]/.test(value)) score++;
      if (/[^A-Za-z0-9]/.test(value) || value.length >= 12) score++;

      const levels = ['weak', 'medium', 'strong'];
      const labels = ['弱い', '普通', '強い'];

      segs.forEach((seg, i) => {
        seg.className = 'strength-segment';
        if (i < score) seg.classList.add(levels[score - 1]);
      });
      label.textContent = `強度: ${labels[score - 1] || ''}`;
    }

    function checkConfirm() {
      const pw = document.getElementById('password').value;
      const confirm = document.getElementById('password-confirm');
      const error = document.getElementById('confirm-error');
      if (confirm.value && confirm.value !== pw) {
        confirm.classList.add('is-error');
        error.style.display = 'flex';
      } else {
        confirm.classList.remove('is-error');
        error.style.display = 'none';
        if (confirm.value && confirm.value === pw) {
          confirm.classList.add('is-valid');
        } else {
          confirm.classList.remove('is-valid');
        }
      }
    }
  </script>

</body>
</html>
