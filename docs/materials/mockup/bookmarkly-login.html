<!DOCTYPE html>
<html lang="ja" data-theme="marine-light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン — bookmarkly</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
  <style>
    :root {
      --ab-semantic-color-brand-default: #0c6993;
      --ab-semantic-color-brand-dark: #003f65;
      --ab-semantic-color-background-base: #f6f7f8;
      --ab-semantic-color-background-rest-primary: #ffffff;
      --ab-semantic-color-text-default: #4e5b61;
      --ab-semantic-color-text-secondary: #899295;
      --ab-semantic-color-text-brand: #0c6993;
      --ab-semantic-color-text-contrast: #ffffff;
      --ab-semantic-color-border-brand: #0c6993;
      --ab-semantic-color-border-bold: #899295;
      --ab-semantic-color-border-light: #e1e7ea;
      --ab-semantic-spacing-1: 4px;
      --ab-semantic-spacing-2: 8px;
      --ab-semantic-spacing-4: 16px;
      --ab-semantic-spacing-6: 24px;
      --ab-semantic-spacing-8: 32px;
      --ab-semantic-border-radius-xs: 4px;
      --ab-semantic-border-radius-sm: 8px;
      --ab-semantic-border-radius-md: 16px;
      --ab-semantic-border-radius-full: 9999px;
      --ab-semantic-border-width-1: 1px;
      --ab-semantic-border-width-2: 2px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Avenir', 'Noto Sans JP', sans-serif;
      background: var(--ab-semantic-color-background-base);
      color: var(--ab-semantic-color-text-default);
      font-size: 14px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--ab-semantic-spacing-4);
    }

    /* ===== LOGIN CARD ===== */
    .login-card {
      background: var(--ab-semantic-color-background-rest-primary);
      border: var(--ab-semantic-border-width-1) solid var(--ab-semantic-color-border-light);
      border-radius: var(--ab-semantic-border-radius-md);
      padding: var(--ab-semantic-spacing-8);
      width: 100%;
      max-width: 440px;
    }

    /* ===== LOGO ===== */
    .login-logo {
      display: flex;
      align-items: center;
      gap: var(--ab-semantic-spacing-2);
      justify-content: center;
      margin-bottom: var(--ab-semantic-spacing-8);
    }

    .login-logo-icon {
      width: 36px;
      height: 36px;
      background: var(--ab-semantic-color-brand-default);
      border-radius: var(--ab-semantic-border-radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--ab-semantic-color-text-contrast);
    }

    .login-logo-text {
      font-size: 20px;
      font-weight: 700;
      color: var(--ab-semantic-color-text-brand);
      letter-spacing: 0.02em;
    }

    /* ===== TITLE ===== */
    .login-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--ab-semantic-color-text-default);
      text-align: center;
      margin-bottom: var(--ab-semantic-spacing-8);
    }

    /* ===== FORM ===== */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: var(--ab-semantic-spacing-1);
      margin-bottom: var(--ab-semantic-spacing-4);
    }

    .form-label {
      font-size: 14px;
      font-weight: 700;
      color: var(--ab-semantic-color-text-default);
    }

    .form-input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .form-input-icon {
      position: absolute;
      left: 12px;
      color: var(--ab-semantic-color-text-secondary);
      font-size: 20px;
      pointer-events: none;
      user-select: none;
    }

    .form-input {
      width: 100%;
      height: 48px;
      padding: 0 12px 0 40px;
      border: var(--ab-semantic-border-width-1) solid var(--ab-semantic-color-border-light);
      border-radius: var(--ab-semantic-border-radius-sm);
      font-family: inherit;
      font-size: 14px;
      color: var(--ab-semantic-color-text-default);
      background: var(--ab-semantic-color-background-rest-primary);
      outline: none;
      transition: border-color 0.15s;
    }

    .form-input::placeholder {
      color: var(--ab-semantic-color-text-secondary);
    }

    .form-input:hover {
      border-color: var(--ab-semantic-color-border-bold);
    }

    .form-input:focus {
      border-color: var(--ab-semantic-color-border-brand);
      border-width: var(--ab-semantic-border-width-2);
    }

    /* ===== PASSWORD TOGGLE ===== */
    .password-toggle {
      position: absolute;
      right: 12px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--ab-semantic-color-text-secondary);
      display: flex;
      align-items: center;
      padding: 0;
    }

    .password-toggle:hover {
      color: var(--ab-semantic-color-text-default);
    }

    /* ===== FORGOT PASSWORD ===== */
    .forgot-password {
      display: flex;
      justify-content: flex-end;
      margin-top: var(--ab-semantic-spacing-1);
    }

    .forgot-password a {
      font-size: 12px;
      color: var(--ab-semantic-color-text-brand);
      text-decoration: none;
    }

    .forgot-password a:hover {
      text-decoration: underline;
    }

    /* ===== BUTTON ===== */
    .btn-primary {
      width: 100%;
      height: 48px;
      background: var(--ab-semantic-color-brand-default);
      color: var(--ab-semantic-color-text-contrast);
      border: var(--ab-semantic-border-width-2) solid var(--ab-semantic-color-brand-default);
      border-radius: var(--ab-semantic-border-radius-full);
      font-family: inherit;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      margin-top: var(--ab-semantic-spacing-6);
    }

    .btn-primary:hover {
      background: var(--ab-semantic-color-brand-dark);
      border-color: var(--ab-semantic-color-brand-dark);
    }

    .btn-primary:active {
      opacity: 0.9;
    }

    /* ===== DIVIDER ===== */
    .divider {
      display: flex;
      align-items: center;
      gap: var(--ab-semantic-spacing-2);
      margin: var(--ab-semantic-spacing-6) 0;
      color: var(--ab-semantic-color-text-secondary);
      font-size: 12px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--ab-semantic-color-border-light);
    }

    /* ===== SIGN UP ===== */
    .signup-prompt {
      text-align: center;
      font-size: 14px;
      color: var(--ab-semantic-color-text-secondary);
    }

    .signup-prompt a {
      color: var(--ab-semantic-color-text-brand);
      font-weight: 700;
      text-decoration: none;
    }

    .signup-prompt a:hover {
      text-decoration: underline;
    }

    /* ===== FOOTER ===== */
    .login-footer {
      margin-top: var(--ab-semantic-spacing-6);
      text-align: center;
      font-size: 12px;
      color: var(--ab-semantic-color-text-secondary);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 480px) {
      .login-card {
        padding: var(--ab-semantic-spacing-6);
        border: none;
        background: transparent;
      }
    }
  </style>
</head>
<body>

  <div class="login-card">

    <!-- Logo -->
    <div class="login-logo">
      <div class="login-logo-icon">
        <span class="material-symbols-outlined" style="font-size:20px;">bookmark</span>
      </div>
      <span class="login-logo-text">bookmarkly</span>
    </div>

    <!-- Title -->
    <h1 class="login-title">ログイン</h1>

    <!-- Form -->
    <form onsubmit="return false;">

      <!-- Email -->
      <div class="form-group">
        <label class="form-label" for="email">メールアドレス</label>
        <div class="form-input-wrapper">
          <span class="form-input-icon material-symbols-outlined">mail</span>
          <input
            class="form-input"
            type="email"
            id="email"
            placeholder="example@email.com"
            autocomplete="email"
          >
        </div>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label class="form-label" for="password">パスワード</label>
        <div class="form-input-wrapper">
          <span class="form-input-icon material-symbols-outlined">lock</span>
          <input
            class="form-input"
            type="password"
            id="password"
            placeholder="パスワードを入力"
            autocomplete="current-password"
          >
          <button
            type="button"
            class="password-toggle"
            onclick="togglePassword()"
            aria-label="パスワードを表示"
          >
            <span class="material-symbols-outlined" id="password-toggle-icon" style="font-size:20px;">visibility</span>
          </button>
        </div>
        <div class="forgot-password">
          <a href="#">パスワードをお忘れですか？</a>
        </div>
      </div>

      <!-- Submit -->
      <button type="submit" class="btn-primary">ログイン</button>

    </form>

    <!-- Divider -->
    <div class="divider">または</div>

    <!-- Sign up -->
    <p class="signup-prompt">
      アカウントをお持ちでない方は
      <a href="bookmarkly-register.html">新規登録</a>
    </p>

  </div>

  <p class="login-footer">© 2026 bookmarkly</p>

  <script>
    function togglePassword() {
      const input = document.getElementById('password');
      const icon = document.getElementById('password-toggle-icon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.textContent = 'visibility_off';
      } else {
        input.type = 'password';
        icon.textContent = 'visibility';
      }
    }
  </script>

</body>
</html>
