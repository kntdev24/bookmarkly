<!DOCTYPE html>
<html lang="ja" data-theme="marine-light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ブックマークを追加 — bookmarkly</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
  <style>
    :root {
      --ab-semantic-color-brand-default: #0c6993;
      --ab-semantic-color-brand-lightest: #ebf4fa;
      --ab-semantic-color-brand-dark: #003f65;
      --ab-semantic-color-background-base: #f6f7f8;
      --ab-semantic-color-background-rest-primary: #ffffff;
      --ab-semantic-color-background-rest-secondary: #eaeef0;
      --ab-semantic-color-background-brand-secondary: #ebf4fa;
      --ab-semantic-color-background-disabled: #d9d9d9;
      --ab-semantic-color-background-overlay: rgba(35,35,35,0.70);
      --ab-semantic-color-text-default: #4e5b61;
      --ab-semantic-color-text-secondary: #899295;
      --ab-semantic-color-text-brand: #0c6993;
      --ab-semantic-color-text-contrast: #ffffff;
      --ab-semantic-color-text-negative: #b21b00;
      --ab-semantic-color-text-disable: #777777;
      --ab-semantic-color-border-brand: #0c6993;
      --ab-semantic-color-border-bold: #899295;
      --ab-semantic-color-border-light: #e1e7ea;
      --ab-semantic-color-border-negative: #b21b00;
      --ab-semantic-spacing-1: 4px;
      --ab-semantic-spacing-2: 8px;
      --ab-semantic-spacing-4: 16px;
      --ab-semantic-spacing-6: 24px;
      --ab-semantic-spacing-8: 32px;
      --ab-semantic-border-radius-xs: 4px;
      --ab-semantic-border-radius-sm: 8px;
      --ab-semantic-border-radius-md: 16px;
      --ab-semantic-border-radius-full: 9999px;
      --ab-semantic-border-width-1: 1px;
      --ab-semantic-border-width-2: 2px;
      --sidebar-width: 240px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Avenir', 'Noto Sans JP', sans-serif;
      background: var(--ab-semantic-color-background-base);
      color: var(--ab-semantic-color-text-default);
      font-size: 14px;
      min-height: 100vh;
    }

    /* ===== LAYOUT ===== */
    .app-layout {
      display: flex;
      min-height: 100vh;
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
      width: var(--sidebar-width);
      background: var(--ab-semantic-color-background-rest-primary);
      border-right: var(--ab-semantic-border-width-1) solid var(--ab-semantic-color-border-light);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      z-index: 100;
      transition: transform 0.25s ease;
    }

    .sidebar-logo {
      padding: var(--ab-semantic-spacing-6) var(--ab-semantic-spacing-4);
      border-bottom: var(--ab-semantic-border-width-1) solid var(--ab-semantic-color-border-light);
      display: flex;
      align-items: center;
      gap: var(--ab-semantic-spacing-2);
    }

    .sidebar-logo-icon {
      width: 32px;
      height: 32px;
      background: var(--ab-semantic-color-brand-default);
      border-radius: var(--ab-semantic-border-radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--ab-semantic-color-text-contrast);
    }

    .sidebar-logo-text {
      font-size: 16px;
      font-weight: 700;
      color: var(--ab-semantic-color-text-brand);
      letter-spacing: 0.02em;
    }

    .sidebar-nav {
      flex: 1;
      padding: var(--ab-semantic-spacing-4) var(--ab-semantic-spacing-2);
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: var(--ab-semantic-spacing-2);
      padding: 10px var(--ab-semantic-spacing-2);
      border-radius: var(--ab-semantic-border-radius-sm);
      color: var(--ab-semantic-color-text-default);
      text-decoration: none;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .nav-item:hover { background: var(--ab-semantic-color-background-rest-secondary); }

    .nav-item .material-symbols-outlined { font-size: 20px; }

    .sidebar-footer {
      padding: var(--ab-semantic-spacing-4);
      border-top: var(--ab-semantic-border-width-1) solid var(--ab-semantic-color-border-light);
    }

    .btn-add-sidebar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--ab-semantic-spacing-2);
      width: 100%;
      height: 42px;
      background: var(--ab-semantic-color-brand-default);
      color: var(--ab-semantic-color-text-contrast);
      border: var(--ab-semantic-border-width-2) solid var(--ab-semantic-color-brand-default);
      border-radius: var(--ab-semantic-border-radius-full);
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-add-sidebar:hover {
      background: var(--ab-semantic-color-brand-dark);
      border-color: var(--ab-semantic-color-brand-dark);
    }

    /* ===== DRAWER ===== */
    .drawer-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--ab-semantic-color-background-overlay);
      z-index: 99;
    }
    .drawer-overlay.open { display: block; }

    /* ===== MAIN ===== */
    .main {
      margin-left: var(--sidebar-width);
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    /* ===== TOPBAR (mobile) ===== */
    .topbar {
      display: none;
      align-items: center;
      gap: var(--ab-semantic-spacing-2);
      padding: 0 var(--ab-semantic-spacing-4);
      height: 56px;
      background: var(--ab-semantic-color-background-rest-primary);
      border-bottom: var(--ab-semantic-border-width-1) solid var(--ab-semantic-color-border-light);
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .topbar-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--ab-semantic-color-text-default);
      flex: 1;
    }

    .icon-btn {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: transparent;
      cursor: pointer;
      border-radius: var(--ab-semantic-border-radius-sm);
      color: var(--ab-semantic-color-text-default);
      transition: background 0.15s;
    }

    .icon-btn:hover { background: var(--ab-semantic-color-background-rest-secondary); }

    /* ===== PAGE CONTENT ===== */
    .page-content {
      padding: var(--ab-semantic-spacing-8) var(--ab-semantic-spacing-6);
      max-width: 680px;
      width: 100%;
    }

    .page-title {
      font-size: 24px;
      font-weight: 700;
      color: var(--ab-semantic-color-text-default);
      margin-bottom: var(--ab-semantic-spacing-6);
    }

    /* ===== ENTRY FORM ===== */
    .entry-card {
      background: var(--ab-semantic-color-background-rest-primary);
      border: var(--ab-semantic-border-width-1) solid var(--ab-semantic-color-border-light);
      border-radius: var(--ab-semantic-border-radius-md);
      overflow: hidden;
    }

    /* テキストエリア */
    .entry-textarea-wrap {
      padding: var(--ab-semantic-spacing-4);
      border-bottom: var(--ab-semantic-border-width-1) solid var(--ab-semantic-color-border-light);
    }

    .entry-textarea {
      width: 100%;
      min-height: 120px;
      border: none;
      outline: none;
      resize: none;
      font-family: inherit;
      font-size: 15px;
      line-height: 1.7;
      color: var(--ab-semantic-color-text-default);
      background: transparent;
    }

    .entry-textarea::placeholder {
      color: var(--ab-semantic-color-text-secondary);
    }

    /* ハッシュタグのハイライト（JS で span に変換） */
    .entry-display {
      width: 100%;
      min-height: 120px;
      font-family: inherit;
      font-size: 15px;
      line-height: 1.7;
      color: var(--ab-semantic-color-text-default);
      white-space: pre-wrap;
      word-break: break-all;
    }

    .entry-display .hashtag {
      color: var(--ab-semantic-color-text-brand);
      font-weight: 700;
    }

    .entry-display .url-text {
      color: var(--ab-semantic-color-text-brand);
      text-decoration: underline;
    }

    /* OGPプレビュー */
    .ogp-preview {
      display: none;
      margin: 0 var(--ab-semantic-spacing-4) var(--ab-semantic-spacing-4);
      border: var(--ab-semantic-border-width-1) solid var(--ab-semantic-color-border-light);
      border-radius: var(--ab-semantic-border-radius-sm);
      overflow: hidden;
      background: var(--ab-semantic-color-background-rest-primary);
    }

    .ogp-preview.visible {
      display: flex;
    }

    .ogp-loading {
      display: none;
      align-items: center;
      gap: var(--ab-semantic-spacing-2);
      padding: var(--ab-semantic-spacing-4);
      font-size: 13px;
      color: var(--ab-semantic-color-text-secondary);
    }

    .ogp-loading.visible { display: flex; }

    .ogp-thumbnail {
      width: 80px;
      height: 80px;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--ab-semantic-color-background-rest-secondary);
    }

    .ogp-info {
      padding: 10px var(--ab-semantic-spacing-4);
      display: flex;
      flex-direction: column;
      gap: 4px;
      justify-content: center;
      min-width: 0;
    }

    .ogp-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--ab-semantic-color-text-default);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .ogp-domain {
      font-size: 12px;
      color: var(--ab-semantic-color-text-secondary);
    }

    .ogp-remove {
      margin-left: auto;
      margin-right: 8px;
      align-self: flex-start;
      margin-top: 8px;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: transparent;
      cursor: pointer;
      border-radius: var(--ab-semantic-border-radius-full);
      color: var(--ab-semantic-color-text-secondary);
      flex-shrink: 0;
      transition: background 0.15s;
    }

    .ogp-remove:hover { background: var(--ab-semantic-color-background-rest-secondary); }
    .ogp-remove .material-symbols-outlined { font-size: 16px; }

    /* タグエリア */
    .tag-area {
      display: none;
      align-items: center;
      flex-wrap: wrap;
      gap: var(--ab-semantic-spacing-1);
      padding: 10px var(--ab-semantic-spacing-4);
      border-top: var(--ab-semantic-border-width-1) solid var(--ab-semantic-color-border-light);
    }

    .tag-area.visible { display: flex; }

    .tag-area-label {
      font-size: 12px;
      color: var(--ab-semantic-color-text-secondary);
      margin-right: 4px;
      flex-shrink: 0;
    }

    .tag-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px 3px 12px;
      background: var(--ab-semantic-color-background-brand-secondary);
      border: var(--ab-semantic-border-width-1) solid var(--ab-semantic-color-brand-lightest);
      border-radius: var(--ab-semantic-border-radius-full);
      font-size: 12px;
      color: var(--ab-semantic-color-text-brand);
      font-weight: 700;
    }

    .tag-pill-remove {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 16px;
      height: 16px;
      border: none;
      background: transparent;
      cursor: pointer;
      color: var(--ab-semantic-color-text-brand);
      padding: 0;
      border-radius: 50%;
      opacity: 0.7;
      transition: opacity 0.15s;
    }

    .tag-pill-remove:hover { opacity: 1; }
    .tag-pill-remove .material-symbols-outlined { font-size: 14px; }

    /* ツールバー */
    .entry-toolbar {
      display: flex;
      align-items: center;
      padding: 10px var(--ab-semantic-spacing-4);
      gap: var(--ab-semantic-spacing-2);
      border-top: var(--ab-semantic-border-width-1) solid var(--ab-semantic-color-border-light);
    }

    .toolbar-hint {
      font-size: 12px;
      color: var(--ab-semantic-color-text-secondary);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .toolbar-hint .material-symbols-outlined { font-size: 14px; }

    .toolbar-hint code {
      background: var(--ab-semantic-color-background-rest-secondary);
      padding: 1px 5px;
      border-radius: var(--ab-semantic-border-radius-xs);
      font-family: monospace;
      font-size: 11px;
      color: var(--ab-semantic-color-text-brand);
    }

    /* アクションボタン */
    .entry-actions {
      display: flex;
      justify-content: flex-end;
      gap: var(--ab-semantic-spacing-2);
      margin-top: var(--ab-semantic-spacing-4);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--ab-semantic-spacing-1);
      height: 42px;
      padding: 0 var(--ab-semantic-spacing-6);
      border-radius: var(--ab-semantic-border-radius-full);
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }

    .btn-outlined {
      background: var(--ab-semantic-color-background-rest-primary);
      color: var(--ab-semantic-color-text-default);
      border: var(--ab-semantic-border-width-2) solid var(--ab-semantic-color-border-light);
    }

    .btn-outlined:hover {
      border-color: var(--ab-semantic-color-border-bold);
    }

    .btn-filled {
      background: var(--ab-semantic-color-brand-default);
      color: var(--ab-semantic-color-text-contrast);
      border: var(--ab-semantic-border-width-2) solid var(--ab-semantic-color-brand-default);
    }

    .btn-filled:hover {
      background: var(--ab-semantic-color-brand-dark);
      border-color: var(--ab-semantic-color-brand-dark);
    }

    .btn-filled:disabled {
      background: var(--ab-semantic-color-background-disabled);
      border-color: var(--ab-semantic-color-background-disabled);
      color: var(--ab-semantic-color-text-disable);
      cursor: not-allowed;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .main { margin-left: 0; }
      .topbar { display: flex; }

      .page-content {
        padding: var(--ab-semantic-spacing-4);
      }

      .page-title { display: none; }

      .entry-actions {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        margin: 0;
        padding: var(--ab-semantic-spacing-2) var(--ab-semantic-spacing-4);
        background: var(--ab-semantic-color-background-rest-primary);
        border-top: var(--ab-semantic-border-width-1) solid var(--ab-semantic-color-border-light);
        justify-content: stretch;
      }

      .entry-actions .btn {
        flex: 1;
      }
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="drawer-overlay" id="drawerOverlay" onclick="closeSidebar()"></div>

<div class="app-layout">

  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon">
        <span class="material-symbols-outlined" style="font-size:18px;">bookmark</span>
      </div>
      <span class="sidebar-logo-text">bookmarkly</span>
    </div>
    <nav class="sidebar-nav">
      <a class="nav-item" href="dashboard.html">
        <span class="material-symbols-outlined">dashboard</span>
        ダッシュボード
      </a>
      <a class="nav-item" href="bookmark-list.html">
        <span class="material-symbols-outlined">bookmarks</span>
        ブックマーク
      </a>
    </nav>
    <div class="sidebar-footer">
      <button class="btn-add-sidebar">
        <span class="material-symbols-outlined" style="font-size:18px;">add</span>
        ブックマークを追加
      </button>
    </div>
  </aside>

  <!-- ===== MAIN ===== -->
  <main class="main">

    <!-- モバイル topbar -->
    <header class="topbar">
      <button class="icon-btn" onclick="openSidebar()">
        <span class="material-symbols-outlined">menu</span>
      </button>
      <span class="topbar-title">ブックマークを追加</span>
    </header>

    <div class="page-content">
      <h1 class="page-title">ブックマークを追加</h1>

      <div class="entry-card">

        <!-- テキストエリア -->
        <div class="entry-textarea-wrap">
          <textarea
            class="entry-textarea"
            id="entryTextarea"
            placeholder="URLやメモを入力...&#10;&#10;例）https://zenn.dev/...&#10;あとで読む #Vue.js #設計"
            autofocus
          ></textarea>
        </div>

        <!-- OGP ローディング -->
        <div class="ogp-loading" id="ogpLoading">
          <span class="material-symbols-outlined" style="font-size:16px;animation:spin 1s linear infinite;">progress_activity</span>
          URLの情報を取得中...
        </div>

        <!-- OGP プレビュー -->
        <div class="ogp-preview" id="ogpPreview">
          <img class="ogp-thumbnail" src="https://placehold.co/80x80/ebf4fa/0c6993?text=OGP" alt="">
          <div class="ogp-info">
            <div class="ogp-title">Vue 3 Composition API 完全ガイド — 実践パターンと設計原則</div>
            <div class="ogp-domain">zenn.dev</div>
          </div>
          <button class="ogp-remove" id="ogpRemove" title="プレビューを削除">
            <span class="material-symbols-outlined">close</span>
          </button>
        </div>

        <!-- タグエリア -->
        <div class="tag-area" id="tagArea">
          <span class="tag-area-label">タグ</span>
        </div>

        <!-- ツールバーヒント -->
        <div class="entry-toolbar">
          <span class="toolbar-hint">
            <span class="material-symbols-outlined">tag</span>
            <code>#キーワード</code> でタグを追加
          </span>
        </div>
      </div>

      <!-- アクションボタン -->
      <div class="entry-actions">
        <button class="btn btn-outlined" onclick="history.back()">キャンセル</button>
        <button class="btn btn-filled" id="submitBtn">追加する</button>
      </div>
    </div>

  </main>
</div>

<script>
  const textarea = document.getElementById('entryTextarea');
  const ogpLoading = document.getElementById('ogpLoading');
  const ogpPreview = document.getElementById('ogpPreview');
  const ogpRemove = document.getElementById('ogpRemove');
  const tagArea = document.getElementById('tagArea');
  const submitBtn = document.getElementById('submitBtn');

  let ogpVisible = false;
  let ogpTimer = null;
  const URL_RE = /https?:\/\/[^\s]+/;
  const TAG_RE = /#([\w\u3040-\u30FF\u4E00-\u9FFF\uFF10-\uFF19\uFF41-\uFF5A\uFF21-\uFF3A]+)/g;

  // 既存タグを非表示にしておく（デモ用に初期は非表示）
  tagArea.classList.remove('visible');

  textarea.addEventListener('input', () => {
    const val = textarea.value;
    handleUrl(val);
    handleTags(val);
    submitBtn.disabled = val.trim() === '';
  });

  // URL検出 → OGPプレビュー（デモ: 1秒後に表示）
  function handleUrl(val) {
    if (ogpVisible) return;
    const match = val.match(URL_RE);
    if (match) {
      clearTimeout(ogpTimer);
      ogpLoading.classList.add('visible');
      ogpTimer = setTimeout(() => {
        ogpLoading.classList.remove('visible');
        ogpPreview.classList.add('visible');
        ogpVisible = true;
      }, 1000);
    } else {
      clearTimeout(ogpTimer);
      ogpLoading.classList.remove('visible');
    }
  }

  // ハッシュタグ検出 → タグpill
  function handleTags(val) {
    const found = [];
    let m;
    TAG_RE.lastIndex = 0;
    while ((m = TAG_RE.exec(val)) !== null) {
      found.push(m[1]);
    }

    // 既存pillをクリアして再描画
    const existingPills = tagArea.querySelectorAll('.tag-pill');
    existingPills.forEach(p => p.remove());

    if (found.length > 0) {
      tagArea.classList.add('visible');
      found.forEach(tag => {
        const pill = document.createElement('span');
        pill.className = 'tag-pill';
        pill.dataset.tag = tag;
        pill.innerHTML = `${tag}<button class="tag-pill-remove" onclick="removeTagPill(this, '${tag}')"><span class="material-symbols-outlined">close</span></button>`;
        tagArea.appendChild(pill);
      });
    } else {
      tagArea.classList.remove('visible');
    }
  }

  // タグをpillから削除（テキストエリアからも#タグを削除）
  function removeTagPill(btn, tag) {
    const re = new RegExp(`\\s?#${tag}\\b`, 'g');
    textarea.value = textarea.value.replace(re, '').trim();
    textarea.dispatchEvent(new Event('input'));
  }

  // OGPプレビューを閉じる
  ogpRemove.addEventListener('click', () => {
    ogpPreview.classList.remove('visible');
    ogpVisible = false;
  });

  // 初期状態: 送信ボタン無効
  submitBtn.disabled = true;

  function openSidebar() {
    document.getElementById('sidebar').classList.add('open');
    document.getElementById('drawerOverlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('drawerOverlay').classList.remove('open');
    document.body.style.overflow = '';
  }
</script>
</body>
</html>
